<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notification Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-6 rounded-xl shadow-lg w-96 m-6">
    
    
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold tracking-wide">
        Notification Center
      </h2>
      <span class="bg-blue-100 text-blue-600 text-sm px-3 py-1 rounded-full">
        3 New
      </span>
    </div>

    
    <div class="space-y-4">

      <div class="bg-red-100 border-l-4 border-red-500 p-4 rounded-lg">
        <h3 class="font-bold text-red-700">
          Action Required
        </h3>
        <p class="text-red-600 leading-relaxed">
          Your last payment failed. Please update your payment
          details to avoid service interruption.
        </p>
      </div>

      <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 rounded-lg">
        <h3 class="font-bold text-yellow-700">
          Maintenance Notice
        </h3>
        <p class="text-yellow-600 leading-relaxed">
          The system will undergo maintenance tonight from
          12 AM to 2 AM.
        </p>
      </div>

    </div>

    
    <div class="flex justify-between mt-6">
      <button class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg shadow">
        View All
      </button>
      <button class="border border-gray-400 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-100">
        Dismiss
      </button>
    </div>

  </div>

</body>
</html>
